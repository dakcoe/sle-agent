<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLE Agent — 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fa-solid fa-brain-circuit neon-glow"></i>
                    <span>SLE Agent</span>
                </div>
                <p class="auth-subtitle">AI 사내 규정 탐색 시스템</p>
            </div>

            <!-- 탭 -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">로그인</button>
                <button class="auth-tab" data-tab="register">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <form id="login-form" class="auth-form">
                <div id="login-error" class="form-error hidden"></div>
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="login-username" placeholder="사용자 아이디" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-right-to-bracket"></i> 로그인
                </button>
            </form>

            <!-- 회원가입 폼 -->
            <form id="register-form" class="auth-form hidden">
                <div id="register-error" class="form-error hidden"></div>
                <div id="register-success" class="form-success hidden"></div>
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="reg-username" placeholder="사용자 아이디" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="reg-password" placeholder="비밀번호" required>
                </div>
                <div class="form-group">
                    <label>계정 유형</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="admin" checked>
                            <span class="role-card">
                                <i class="fa-solid fa-user-shield"></i>
                                <strong>관리자</strong>
                                <small>문서 업로드 및 관리</small>
                            </span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="user">
                            <span class="role-card">
                                <i class="fa-solid fa-user"></i>
                                <strong>일반 사용자</strong>
                                <small>규정 검색 및 질문</small>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-group" id="admin-code-group" style="display:none;">
                    <label>관리자 접속 코드</label>
                    <input type="text" id="reg-admin-code" placeholder="관리자로부터 받은 코드 입력" style="text-transform:uppercase;">
                    <small class="form-hint">관리자가 공유한 8자리 코드를 입력하세요</small>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-user-plus"></i> 회원가입
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // 탭 전환
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                document.getElementById('login-form').classList.toggle('hidden', target !== 'login');
                document.getElementById('register-form').classList.toggle('hidden', target !== 'register');
            });
        });

        // 역할 선택에 따른 코드 입력란 토글
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const show = document.querySelector('input[name="role"]:checked').value === 'user';
                document.getElementById('admin-code-group').style.display = show ? 'block' : 'none';
            });
        });

        // 로그인
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('login-error');
            errEl.classList.add('hidden');
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '로그인 실패');
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.username);
                window.location.href = data.role === 'admin' ? 'admin.html' : 'chat.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            }
        });

        // 회원가입
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('register-error');
            const sucEl = document.getElementById('register-success');
            errEl.classList.add('hidden');
            sucEl.classList.add('hidden');

            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const admin_code = document.getElementById('reg-admin-code').value.trim().toUpperCase();

            const body = { username, password, role };
            if (role === 'user') body.admin_code = admin_code;

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '회원가입 실패');

                if (role === 'admin') {
                    sucEl.innerHTML = `
                        <i class="fa-solid fa-circle-check"></i>
                        관리자 계정이 생성되었습니다!<br>
                        <strong>접속 코드: <span class="code-badge">${data.admin_code}</span></strong><br>
                        <small>이 코드를 사용자에게 공유하세요. 로그인 탭으로 이동해 접속하세요.</small>
                    `;
                } else {
                    sucEl.innerHTML = `<i class="fa-solid fa-circle-check"></i> 가입 완료! 로그인 탭에서 접속하세요.`;
                }
                sucEl.classList.remove('hidden');
                e.target.reset();
                document.getElementById('admin-code-group').style.display = 'none';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            }
        });

        // 이미 로그인 상태면 리다이렉트
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (token && role) {
            window.location.href = role === 'admin' ? 'admin.html' : 'chat.html';
        }
    </script>
</body>
</html>
