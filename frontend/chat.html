<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLE Agent — 규정 탐색</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="chat-layout">
        <!-- 헤더 -->
        <header class="chat-header">
            <div class="chat-header-left">
                <div class="logo">
                    <i class="fa-solid fa-brain-circuit neon-glow"></i>
                    <span>SLE Agent</span>
                </div>
                <div class="status-indicator online"></div>
                <div>
                    <span class="chat-title">AI 사내 규정 탐색</span>
                    <span id="chat-username" class="header-username"></span>
                </div>
            </div>
            <div class="chat-header-right">
                <button id="btn-reset-chat" class="btn btn-icon" title="대화 초기화">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button id="btn-logout" class="btn btn-outline btn-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
                </button>
            </div>
        </header>

        <!-- 채팅 메시지 영역 -->
        <section id="chat-feed" class="chat-feed">
            <div class="message assistant welcome">
                <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-bubble-wrapper">
                    <div class="message-bubble">
                        안녕하세요! 사내 규정 탐색 에이전트입니다.<br><br>
                        궁금한 규정 사항을 자유롭게 질문해 주세요.<br>
                        관련 조항과 출처를 함께 안내해 드립니다.
                    </div>
                </div>
            </div>
        </section>

        <!-- 입력 영역 -->
        <footer class="chat-footer">
            <form id="chat-form" class="chat-form">
                <input type="text" id="query-input"
                    placeholder="예: 육아휴직 신청 기간과 조건이 어떻게 되나요?"
                    autocomplete="off" required>
                <button type="submit" id="btn-send" class="btn btn-send-icon">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
    requireRole('user', 'admin');
    document.getElementById('chat-username').textContent = localStorage.getItem('username') || '';
    document.getElementById('btn-logout').addEventListener('click', logout);

    let conversationHistory = [];

    document.getElementById('btn-reset-chat').addEventListener('click', () => {
        conversationHistory = [];
        const feed = document.getElementById('chat-feed');
        feed.innerHTML = `
            <div class="message assistant welcome">
                <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-bubble-wrapper">
                    <div class="message-bubble">대화가 초기화되었습니다. 새로운 질문을 입력해 주세요.</div>
                </div>
            </div>
        `;
    });

    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('query-input');
        const question = input.value.trim();
        if (!question) return;
        input.value = '';

        appendMessage('user', question);

        const thinking = appendThinking();

        try {
            const res = await authFetch('/api/query', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ question, conversation_history: conversationHistory })
            });
            const data = await res.json();
            removeThinking(thinking);

            const answer = data.answer || '답변을 가져오지 못했습니다.';
            appendMessage('assistant', answer, data.source, data.path_taken);

            conversationHistory.push({ role: 'user', content: question });
            conversationHistory.push({ role: 'assistant', content: answer, source: data.source });
            if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
        } catch (err) {
            removeThinking(thinking);
            appendMessage('assistant', '오류가 발생했습니다: ' + err.message);
        }
    });

    function appendMessage(role, content, source, pathTaken) {
        const feed = document.getElementById('chat-feed');
        const div = document.createElement('div');
        div.className = `message ${role}`;

        let extra = '';
        if (source) {
            extra += `<div class="msg-source"><i class="fa-solid fa-location-dot"></i> ${source}</div>`;
        }
        if (pathTaken && pathTaken.length) {
            const steps = pathTaken.map(p => {
                const icon = p.type === '폴더'
                    ? '<i class="fa-solid fa-folder"></i>'
                    : '<i class="fa-solid fa-file-lines"></i>';
                return `<span class="path-step ${p.found ? 'found' : ''}">${icon} ${p.name}</span>`;
            }).join('');
            extra += `<div class="msg-path">${steps}</div>`;
        }

        div.innerHTML = `
            ${role === 'assistant' ? '<div class="message-avatar"><i class="fa-solid fa-robot"></i></div>' : ''}
            <div class="message-bubble-wrapper">
                <div class="message-bubble">${escapeHtml(content).replace(/\n/g,'<br>')}</div>
                ${extra}
            </div>
        `;
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
        return div;
    }

    function appendThinking() {
        const feed = document.getElementById('chat-feed');
        const div = document.createElement('div');
        div.className = 'message assistant thinking';
        div.innerHTML = `
            <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
            <div class="message-bubble-wrapper">
                <div class="message-bubble">
                    <span class="dot-flashing"></span>
                </div>
            </div>
        `;
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
        return div;
    }

    function removeThinking(el) { el?.remove(); }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    </script>
</body>
</html>
